name: RoImobiliare Daily Scraper v3

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Mod rulare"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - sync_only
          - sibiu_only

jobs:
  scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GHL_WEBHOOK_URL: ${{ secrets.GHL_WEBHOOK_URL }}
          SCRAPE_MODE: ${{ github.event.inputs.mode || 'full' }}
        run: |
          echo "Mod: $SCRAPE_MODE"
          python scraper.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
